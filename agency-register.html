<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" id="viewport-meta" />
    <script>
        // 모바일에서도 데스크탑 레이아웃이 자연스럽게 축소되도록 조정
        if (screen.width < 1280) {
            document.getElementById('viewport-meta').setAttribute('content', 'width=1280');
        }
    </script>
    <title>대행사 등록 신청 | SISA</title>
    <!-- 폰트 / 아이콘 / Tailwind -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            blue: '#2f4b9f',
                            dark: '#1e326b',
                            accent: '#e6edf7'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.4); }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-brand-blue text-white font-sans overflow-x-hidden antialiased flex flex-col min-h-screen">

    <!-- 상단 네비게이션 (간단 버전) -->
    <header class="fixed w-full top-0 z-50 glass-card border-b-0 border-white/10">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='index.html'">
                <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-blue-400 via-indigo-500 to-purple-500 flex items-center justify-center shadow-md shadow-purple-500/40 border border-white/20">
                    <i class="fa-solid fa-globe text-white text-sm"></i>
                </div>
                <div class="flex flex-col justify-center">
                    <span class="text-lg font-extrabold tracking-tight leading-none">SISA</span>
                    <span class="text-[9px] text-white/70 font-semibold tracking-[0.16em] uppercase leading-none mt-0.5">Agency Registration</span>
                </div>
            </div>
        </div>
    </header>

    <!-- 메인 영역 -->
    <main class="flex-grow pt-24 pb-16 px-4">
        <div class="max-w-3xl mx-auto">
            <div class="glass-card rounded-[2rem] border border-white/20 shadow-2xl p-8 md:p-10">
                <div class="mb-8">
                    <h1 class="text-2xl md:text-3xl font-bold mb-2 flex items-center gap-3">
                        <i class="fa-solid fa-building-circle-check text-brand-accent text-xl"></i>
                        대행사 등록 신청
                    </h1>
                    <p class="text-sm md:text-[15px] text-white/70 leading-relaxed">
                        아래 정보를 정확히 입력해 주시면 SISA 본사 어드민에서 검토 후, 별도의 안내 메일 또는 연락을 드립니다.
                        이 페이지 링크를 파트너 후보에게 전달하여 온라인으로 신청을 받으실 수 있습니다.
                    </p>
                </div>

                <!-- 신청 폼 -->
                <form
                    class="space-y-5"
                    method="post"
                    action="/agency-apply"
                    onsubmit="return confirmSubmit();"
                >
                    <!-- 업체명 -->
                    <div>
                        <label for="company_name" class="block text-xs font-semibold text-white/70 mb-1 uppercase tracking-[0.16em]">
                            업체명
                        </label>
                        <input
                            id="company_name"
                            name="업체명"
                            type="text"
                            required
                            placeholder="예: 월드시사 경매대행"
                            class="w-full bg-black/20 border border-white/20 rounded-xl py-3 px-4 text-sm md:text-base text-white placeholder-white/40 focus:outline-none focus:border-brand-accent focus:bg-white/5 transition"
                        />
                    </div>

                    <!-- 도메인(영문) -->
                    <div>
                        <label for="domain" class="block text-xs font-semibold text-white/70 mb-1 uppercase tracking-[0.16em]">
                            도메인 (영문)
                        </label>
                        <div class="flex items-stretch gap-2">
                            <span class="px-3 py-3 rounded-xl bg-black/30 border border-white/20 text-xs md:text-sm text-white/70 flex items-center">
                                https://
                            </span>
                            <input
                                id="domain"
                                name="도메인(영문)"
                                type="text"
                                required
                                placeholder="예: example-auction.com"
                                class="flex-1 bg-black/20 border border-white/20 rounded-xl py-3 px-3 text-sm md:text-base text-white placeholder-white/40 focus:outline-none focus:border-brand-accent focus:bg-white/5 transition"
                            />
                        </div>
                    </div>

                    <!-- 전화번호 -->
                    <div>
                        <label for="phone" class="block text-xs font-semibold text-white/70 mb-1 uppercase tracking-[0.16em]">
                            전화번호
                        </label>
                        <input
                            id="phone"
                            name="전화번호"
                            type="text"
                            required
                            placeholder="예: 02-123-4567 또는 010-1234-5678"
                            class="w-full bg-black/20 border border-white/20 rounded-xl py-3 px-4 text-sm md:text-base text-white placeholder-white/40 focus:outline-none focus:border-brand-accent focus:bg-white/5 transition"
                        />
                    </div>

                    <!-- 은행명 / 계좌번호 -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label for="bank_name" class="block text-xs font-semibold text-white/70 mb-1 uppercase tracking-[0.16em]">
                                은행명
                            </label>
                            <input
                                id="bank_name"
                                name="은행명"
                                type="text"
                                required
                                placeholder="예: 카카오뱅크"
                                class="w-full bg-black/20 border border-white/20 rounded-xl py-3 px-4 text-sm md:text-base text-white placeholder-white/40 focus:outline-none focus:border-brand-accent focus:bg-white/5 transition"
                            />
                        </div>
                        <div>
                            <label for="account_number" class="block text-xs font-semibold text-white/70 mb-1 uppercase tracking-[0.16em]">
                                계좌번호
                            </label>
                            <input
                                id="account_number"
                                name="계좌번호"
                                type="text"
                                required
                                placeholder="예: 3333-12-3456789"
                                class="w-full bg-black/20 border border-white/20 rounded-xl py-3 px-4 text-sm md:text-base text-white placeholder-white/40 focus:outline-none focus:border-brand-accent focus:bg-white/5 transition"
                            />
                        </div>
                    </div>

                    <!-- 이메일 또는 구글 시트 -->
                    <div>
                        <label for="email_or_sheet" class="block text-xs font-semibold text-white/70 mb-1 uppercase tracking-[0.16em]">
                            이메일 또는 구글 시트
                        </label>
                        <input
                            id="email_or_sheet"
                            name="이메일_또는_구글시트"
                            type="text"
                            required
                            placeholder="예: partner@example.com 또는 Google Sheet 공유 링크"
                            class="w-full bg-black/20 border border-white/20 rounded-xl py-3 px-4 text-sm md:text-base text-white placeholder-white/40 focus:outline-none focus:border-brand-accent focus:bg-white/5 transition"
                        />
                        <p class="mt-1 text-[11px] text-white/60">
                            정산 및 거래 보고를 받을 이메일 주소 또는 본사의 정산용 Google Sheet 공유 링크를 입력해 주세요.
                        </p>
                    </div>

                    <!-- 로그인 아이디 -->
                    <div>
                        <label for="agency_login_id" class="block text-xs font-semibold text-white/70 mb-1 uppercase tracking-[0.16em]">
                            로그인 아이디
                        </label>
                        <input
                            id="agency_login_id"
                            name="대행사아이디"
                            type="text"
                            required
                            placeholder="예: agency001"
                            class="w-full bg-black/20 border border-white/20 rounded-xl py-3 px-4 text-sm md:text-base text-white placeholder-white/40 focus:outline-none focus:border-brand-accent focus:bg-white/5 transition"
                        />
                    </div>

                    <!-- 로그인 비밀번호 -->
                    <div>
                        <label for="agency_login_pw" class="block text-xs font-semibold text-white/70 mb-1 uppercase tracking-[0.16em]">
                            로그인 비밀번호
                        </label>
                        <input
                            id="agency_login_pw"
                            name="대행사비밀번호"
                            type="password"
                            required
                            placeholder="영문/숫자 조합 8자 이상"
                            class="w-full bg-black/20 border border-white/20 rounded-xl py-3 px-4 text-sm md:text-base text-white placeholder-white/40 focus:outline-none focus:border-brand-accent focus:bg-white/5 transition"
                        />
                    </div>

                    <!-- 신청하기 버튼 -->
                    <div class="pt-4">
                        <button
                            type="submit"
                            class="w-full bg-brand-accent text-brand-blue font-bold text-base md:text-lg py-3.5 md:py-4 rounded-xl hover:bg-white transition shadow-[0_0_18px_rgba(230,237,247,0.35)] flex items-center justify-center gap-2"
                        >
                            <i class="fa-solid fa-paper-plane"></i>
                            신청하기
                        </button>
                        <p class="mt-3 text-[11px] text-white/55 text-center leading-relaxed">
                            버튼을 누르시면 현재 입력하신 내용이 SISA 본사 어드민 시스템으로 전송됩니다.
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
      function confirmSubmit() {
        return confirm("입력하신 내용으로 대행사 등록 신청을 전송하시겠습니까?");
      }
    </script>

</body>
</html>
